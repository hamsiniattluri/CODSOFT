<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🎬 Movie Recommendation System</h1>

    <form method="POST">

        <input
            type="text"
            name="movie"
            placeholder="Enter Movie Name"
            required>

        <button type="submit">
            Get Recommendations
        </button>

    </form>

    {% if recommendations %}

    <div class="results">

        <h2>Recommended Movies</h2>

        <ul>

        {% for movie in recommendations %}

            <li>⭐ {{ movie }}</li>

        {% endfor %}

        </ul>

    </div>

    {% endif %}

</div>

</body>
</html>
